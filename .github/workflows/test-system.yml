name: System tests

on:
  pull_request:
  schedule:
    - cron: '00 2 * * *'
  workflow_dispatch:

jobs:
  test:
    name: Run system tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26'
      - uses: actions/checkout@v7
      - run: make test-system
        env:
          PORKBUN_API_KEY: ${{ secrets.PORKBUN_API_KEY }}
          PORKBUN_SECRET_KEY: ${{ secrets.PORKBUN_SECRET_KEY }}
